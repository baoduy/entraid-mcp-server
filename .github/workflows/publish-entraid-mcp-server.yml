name: Publish entraid-mcp-server

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'src/msgraph_mcp_server/**'
      - 'pyproject.toml'
      - 'README.md'
      - 'LICENSE'
      - '.github/workflows/publish-entraid-mcp-server.yml'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up uv
        uses: astral-sh/setup-uv@v2
        with:
          version: latest

      # Versioning
      - name: Calculate version
        id: version
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "(MAJOR)"
          minor_pattern: "(MINOR)"
          version_format: "${major}.${minor}.${patch}"
          bump_each_commit: false
          search_commit_body: false

      - name: Set NEXT_VERSION
        run: echo "NEXT_VERSION=${{ steps.version.outputs.version }}" >> $GITHUB_ENV

      - name: Print the version
        run: 'echo "Next version: ${{ env.NEXT_VERSION }}"'

      - name: Apply version to pyproject.toml
        run: |
          python -c "import re,pathlib; p=pathlib.Path('pyproject.toml'); s=p.read_text(); s=re.sub(r'(?m)^version\s*=\s*\"[^\"]+\"', 'version = \"${{ env.NEXT_VERSION }}\"', s, count=1); p.write_text(s)"

      - name: Build package
        run: uv build

      - name: List build artifacts
        run: ls -l dist

      - name: Publish to PyPI
        run: uv publish

      # Create Release
      - name: Release
        uses: softprops/action-gh-release@v2.6.1
        if: ${{ github.ref == 'refs/heads/main' }}
        continue-on-error: true
        with:
          generate_release_notes: true
          make_latest: true
          files: dist/*
          tag_name: v${{ env.NEXT_VERSION }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
